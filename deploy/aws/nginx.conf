# MoneyPenny Dashboard — nginx site config
# Installed to /etc/nginx/sites-available/moneypenny by 03_deploy_app.sh

server {
    listen 80;
    server_name _;

    # Allow large request bodies (the chatbot occasionally posts long context)
    client_max_body_size 10M;

    # ── Frontend: serve the Vite production bundle ─────────────────────────
    # Content-hashed assets (anything under /assets/index-XXXXXX.js etc.)
    # can be cached aggressively — the hash in the filename changes when the
    # content changes, so a stale cache is impossible.
    location /assets/ {
        root /opt/moneypenny/frontend/dist;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # SPA root: never cache the HTML. The HTML references a content-hashed
    # bundle (index-XXXXXX.js); if a deploy bumps that hash but the browser
    # has an older HTML cached, it'll keep loading the OLD JS forever. We
    # saw exactly that with Penny's "Non-Billable chart not appearing" bug
    # (2026-06-11) — the JS was deployed but her HTML was still pointing at
    # a pre-fix bundle hash. no-store on the HTML eliminates the trap.
    location / {
        root /opt/moneypenny/frontend/dist;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
        add_header Pragma        "no-cache";
        add_header Expires       "0";
    }

    # ── Backend API + WebSocket proxy ──────────────────────────────────────
    location /api/ {
        proxy_pass http://localhost:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Generous timeouts — the upstream timesheet/EOD scans can take 20-30s
        # on a cold cache.
        proxy_connect_timeout 60s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;
    }
}
