# MoneyPenny Dashboard — nginx site config
# Installed to /etc/nginx/sites-available/moneypenny by 03_deploy_app.sh

server {
    listen 80;
    server_name _;

    # Allow large request bodies (the chatbot occasionally posts long context)
    client_max_body_size 10M;

    # ── Frontend: serve the Vite production bundle ─────────────────────────
    location / {
        root /opt/moneypenny/frontend/dist;
        try_files $uri $uri/ /index.html;
    }

    # ── Backend API + WebSocket proxy ──────────────────────────────────────
    location /api/ {
        proxy_pass http://localhost:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Generous timeouts — the upstream timesheet/EOD scans can take 20-30s
        # on a cold cache.
        proxy_connect_timeout 60s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;
    }
}
